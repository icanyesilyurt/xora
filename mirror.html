<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X Mirror — XORA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <a href="index.html" class="logo">XO<span>RA</span></a>
  <nav class="topnav">
    <a href="credits.html" class="pill credits-pill">⚡ <b id="creditVal">10</b></a>
    <a href="profile.html" class="pill" data-i18n="nav_profile">Profil</a>
    <button type="button" class="pill lang-btn" id="langBtn">EN</button>
  </nav>
</header>

<main class="page">

  <!-- 1) X BAĞLA -->
  <section id="inputView">
    <span class="mode-emoji">🪞</span>
    <h1 data-i18n="mirror_h1">X Mirror</h1>
    <p class="sub" data-i18n="mirror_sub">Hesabını bağla, XORA son paylaşımlarına baksın. Kendi kartın her zaman ücretsiz.</p>

    <div class="handle-form">
      <button type="button" class="btn" id="goBtn" data-i18n="mirror_connect_cta">X hesabını bağla ve analiz et</button>
    </div>
  </section>

  <!-- 2) XORA DÜŞÜNÜYOR -->
  <section id="analyzingView" hidden>
    <div class="thinking">
      <div class="xora-face" aria-hidden="true">
        <span class="xora-eye"></span><span class="xora-eye"></span>
      </div>
      <p class="think-msg" id="thinkMsg"></p>
      <div class="think-dots" aria-hidden="true"><i></i><i></i><i></i></div>
    </div>
  </section>

  <!-- 3) KİMLİK KARTI -->
  <section id="resultView" hidden>
    <div id="cardHolder"></div>

    <div class="result-actions">
      <button type="button" class="btn btn-orange" id="dlBtn" data-i18n="btn_download">Kartı İndir</button>
      <button type="button" class="btn" id="shareBtn" data-i18n="btn_share">X'te Paylaş</button>
    </div>

    <p class="upsell">
      <span data-i18n="upsell_mirror">Peki ya o kişi? 👀</span>
      <a href="stalk.html" data-i18n="upsell_mirror_btn">X Stalk ile bak</a>
    </p>
  </section>

</main>

<footer class="foot">XORA V1</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>
<script src="xora.js"></script>
<script src="card.js"></script>
<script>
(function () {
  var lastResult = null;
  var mirrorState = "input";

  var inputView  = document.getElementById("inputView");
  var analyzingView  = document.getElementById("analyzingView");
  var resultView = document.getElementById("resultView");
  var goBtn      = document.getElementById("goBtn");

  function mirrorLog(label, data) {
    if (window.console) console.log("[XORA mirror]", label, data || "");
  }

  function setMirrorState(state) {
    mirrorState = state;
    [
      inputView,
      analyzingView,
      resultView
    ].forEach(function (view) {
      if (view) view.hidden = true;
    });

    var selected = {
      input: inputView,
      analyzing: analyzingView,
      result: resultView
    }[state];

    if (selected) selected.hidden = false;
    mirrorLog("state", state);
  }

  function renderInput() {
    setMirrorState("input");
    goBtn.setAttribute("data-i18n", "mirror_connect_cta");
    goBtn.textContent = t("mirror_connect_cta");
    applyI18n();
  }

  function showResult() {
    document.getElementById("cardHolder").innerHTML = buildIdentityCard(lastResult);
    setMirrorState("result");
    applyI18n();
    mirrorLog("render card", { handle: lastResult && lastResult.handle });
  }

  function startMirror() {
    if (!isLoggedIn()) {
      window.location.href = "auth.html";
      return;
    }
    var handle = normHandle(getUser());
    if (!handle) {
      toast(t("toast_handle"));
      return;
    }
    lastResult = analyzeHandle(handle);
    addHistory({ type: "mirror", handles: [handle] });
    saveAnalysisRecord("mirror", [handle], lastResult);

    setMirrorState("analyzing");
    playThinking(document.getElementById("thinkMsg"), "mirror", showResult);
  }

  async function initMirror() {
    mirrorLog("init", { url: window.location.href });
    if (!isLoggedIn()) window.location.href = "auth.html";
    renderInput();
  }

  document.getElementById("goBtn").addEventListener("click", startMirror);

  document.getElementById("dlBtn").addEventListener("click", function () {
    if (lastResult) downloadCanvas(renderIdentityPNG(lastResult), "xora-mirror-" + lastResult.handle + ".png");
  });
  document.getElementById("shareBtn").addEventListener("click", function () {
    if (lastResult) shareOnX(shareIdentityText(lastResult));
  });

  // dil değişince kartı yeniden çiz
  document.addEventListener("xora:lang", function () {
    if (mirrorState === "input") renderInput();
    if (lastResult && mirrorState === "result") showResult();
  });

  initMirror();
})();
</script>

</body>
</html>
