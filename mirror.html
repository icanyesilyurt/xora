<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X Mirror — XORA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <a href="index.html" class="logo">XO<span>RA</span></a>
  <nav class="topnav">
    <a href="credits.html" class="pill credits-pill">⚡ <b id="creditVal">10</b></a>
    <a href="profile.html" class="pill" data-i18n="nav_profile">Profil</a>
    <button type="button" class="pill lang-btn" id="langBtn">EN</button>
  </nav>
</header>

<main class="page">

  <!-- 1) GİRİŞ -->
  <section id="step-input">
    <span class="mode-emoji">🪞</span>
    <h1 data-i18n="mirror_h1">X Mirror</h1>
    <p class="sub" data-i18n="mirror_sub">Hesabını bağla, XORA son paylaşımlarına baksın. Kendi kartın her zaman ücretsiz.</p>

    <div class="handle-form">
      <button type="button" class="btn" id="goBtn" data-i18n="mirror_login_cta">X ile giriş yap ve kartımı çıkar</button>
      <p class="cost-note" id="mirrorLoginNote" data-i18n="mirror_login_note" hidden>Mirror için X hesabını bağlaman gerekir.</p>
    </div>
  </section>

  <!-- 2) PROFİL TAMAMLAMA -->
  <section id="step-profile" hidden>
    <span class="mode-emoji">🪞</span>
    <h1 data-i18n="mirror_profile_h">Profilini Tamamla</h1>
    <p class="sub" data-i18n="mirror_profile_sub">Kartını oluşturmadan önce bilgilerini gözden geçir.</p>

    <div class="handle-form">
      <input type="text" id="displayNameInput" class="handle-input" data-i18n-ph="mirror_display_name" placeholder="Görünen ad" autocomplete="name">
      <input type="text" id="countryInput" class="handle-input" data-i18n-ph="mirror_country" placeholder="Ülke" autocomplete="country-name">
      <input type="text" id="cityInput" class="handle-input" data-i18n-ph="mirror_city" placeholder="Şehir" autocomplete="address-level2">
      <input type="text" id="bioInput" class="handle-input" data-i18n-ph="mirror_bio" placeholder="Kısa bio" maxlength="140">
      <input type="url" id="websiteInput" class="handle-input" data-i18n-ph="mirror_website" placeholder="Web sitesi" autocomplete="url">
      <input type="url" id="avatarUrlInput" class="handle-input" data-i18n-ph="mirror_avatar_url" placeholder="Profil fotoğrafı URL">
      <div class="result-actions">
        <button type="button" class="btn" id="saveProfileBtn" data-i18n="mirror_save">Kaydet</button>
        <button type="button" class="btn btn-ghost" id="skipProfileBtn" data-i18n="mirror_skip">Şimdilik geç</button>
      </div>
    </div>
  </section>

  <!-- 3) XORA DÜŞÜNÜYOR -->
  <section id="step-think" hidden>
    <div class="thinking">
      <div class="xora-face" aria-hidden="true">
        <span class="xora-eye"></span><span class="xora-eye"></span>
      </div>
      <p class="think-msg" id="thinkMsg"></p>
      <div class="think-dots" aria-hidden="true"><i></i><i></i><i></i></div>
    </div>
  </section>

  <!-- 4) KİMLİK KARTI -->
  <section id="step-result" hidden>
    <div id="cardHolder"></div>

    <div class="result-actions">
      <button type="button" class="btn btn-orange" id="dlBtn" data-i18n="btn_download">Kartı İndir</button>
      <button type="button" class="btn" id="shareBtn" data-i18n="btn_share">X'te Paylaş</button>
    </div>

    <p class="upsell">
      <span data-i18n="upsell_mirror">Peki ya o kişi? 👀</span>
      <a href="stalk.html" data-i18n="upsell_mirror_btn">X Stalk ile bak</a>
    </p>
  </section>

</main>

<footer class="foot">XORA V1</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>
<script src="xora.js"></script>
<script src="card.js"></script>
<script>
(function () {
  var lastResult = null;
  var mirrorStarted = false;
  var mirrorSession = null;
  var mirrorProfileShown = false;

  var stepInput  = document.getElementById("step-input");
  var stepProfile = document.getElementById("step-profile");
  var stepThink  = document.getElementById("step-think");
  var stepResult = document.getElementById("step-result");
  var goBtn      = document.getElementById("goBtn");
  var note       = document.getElementById("mirrorLoginNote");
  var displayNameInput = document.getElementById("displayNameInput");
  var countryInput = document.getElementById("countryInput");
  var cityInput = document.getElementById("cityInput");
  var bioInput = document.getElementById("bioInput");
  var websiteInput = document.getElementById("websiteInput");
  var avatarUrlInput = document.getElementById("avatarUrlInput");

  function mirrorLog(label, data) {
    if (window.console) console.log("[XORA mirror]", label, data || "");
  }

  function cleanMirrorUrl() {
    if (window.history && window.history.replaceState) {
      window.history.replaceState({}, "", "mirror.html");
    }
  }

  function sessionFromResult(result) {
    return result && result.data && result.data.session ? result.data.session : null;
  }

  function profileFromUser(user) {
    var profile = normalizeXProfile(user);
    mirrorLog("profile payload", profile);
    return profile;
  }

  function renderMirrorHeader(hasSession) {
    var nav = document.querySelector('[data-i18n="nav_profile"]');
    if (!nav) return;

    if (!hasSession) {
      nav.textContent = t("nav_login");
      nav.href = "#auth";
      nav.onclick = function (e) {
        e.preventDefault();
        startLogin();
      };
      return;
    }

    nav.textContent = t("profile_logout");
    nav.href = "#logout";
    nav.onclick = async function (e) {
      e.preventDefault();
      await clearSession();
      mirrorSession = null;
      mirrorStarted = false;
      mirrorProfileShown = false;
      renderLogin(false);
    };
  }

  function renderLogin(showNote) {
    stepInput.hidden = false;
    stepProfile.hidden = true;
    stepThink.hidden = true;
    stepResult.hidden = true;
    goBtn.setAttribute("data-i18n", "mirror_login_cta");
    goBtn.textContent = t("mirror_login_cta");
    note.hidden = !showNote;
    renderMirrorHeader(false);
  }

  function renderProfileForm(profile) {
    stepInput.hidden = true;
    stepProfile.hidden = false;
    stepThink.hidden = true;
    stepResult.hidden = true;

    displayNameInput.value = profile.display_name || profile.username || "";
    countryInput.value = "";
    cityInput.value = "";
    bioInput.value = "";
    websiteInput.value = "";
    avatarUrlInput.value = profile.avatar_url || "";
    applyI18n();
    renderMirrorHeader(true);
  }

  function showResult() {
    document.getElementById("cardHolder").innerHTML = buildIdentityCard(lastResult);
    stepThink.hidden = true;
    stepResult.hidden = false;
    applyI18n();
    renderMirrorHeader(true);
    mirrorLog("render card", { handle: lastResult && lastResult.handle });
  }

  function startMirror(session) {
    if (mirrorStarted || !session || !session.user) return;
    mirrorStarted = true;
    mirrorSession = session;

    var profile = profileFromUser(session.user);
    storeAuthUser(profile);
    refreshAuthUi();
    renderMirrorHeader(true);
    cleanMirrorUrl();

    var handle = normHandle(profile.username);
    lastResult = analyzeHandle(handle);
    addHistory({ type: "mirror", handles: [handle] });

    stepInput.hidden = true;
    stepThink.hidden = false;
    playThinking(document.getElementById("thinkMsg"), "mirror", showResult);
  }

  async function saveProfileCompletion() {
    if (!mirrorSession || !mirrorSession.user) return;

    var extra = {
      display_name: displayNameInput.value.trim(),
      country: countryInput.value.trim(),
      city: cityInput.value.trim(),
      bio: bioInput.value.trim(),
      website: websiteInput.value.trim(),
      avatar_url: avatarUrlInput.value.trim()
    };
    localStorage.setItem("xora_profile_extra", JSON.stringify(extra));

    var sb = getSupabaseClient();
    if (sb) {
      var payload = {
        display_name: extra.display_name || profileFromUser(mirrorSession.user).display_name,
        avatar_url: extra.avatar_url || profileFromUser(mirrorSession.user).avatar_url || null,
        last_login_at: new Date().toISOString()
      };
      console.log("[XORA db] profile completion update payload", payload);
      var result = await sb.from("users").update(payload).eq("id", mirrorSession.user.id).select();
      if (result.error) {
        console.error("[XORA db] profile completion update failed", result.error);
        console.error("[XORA db] profile completion update failed full", JSON.stringify(result.error, null, 2));
      } else {
        console.log("[XORA db] profile completion update result", result.data);
      }
    }

    startMirror(mirrorSession);
  }

  function skipProfileCompletion() {
    startMirror(mirrorSession);
  }

  async function waitForMirrorSession(sb) {
    for (var i = 0; i < 10; i++) {
      var result = await sb.auth.getSession();
      mirrorLog("getSession", {
        attempt: i + 1,
        hasSession: !!sessionFromResult(result),
        error: result.error
      });
      var session = sessionFromResult(result);
      if (session) return session;
      await new Promise(function (resolve) { setTimeout(resolve, 300); });
    }
    return null;
  }

  async function startLogin() {
    var sb = getSupabaseClient();
    if (!sb) {
      toast(t("auth_config_missing"));
      return;
    }

    var result = await sb.auth.signInWithOAuth({
      provider: "x",
      options: {
        redirectTo: "https://icanyesilyurt.github.io/xora/mirror.html"
      }
    });
    mirrorLog("signInWithOAuth result", { data: result.data, error: result.error });
    if (result.error) toast(result.error.message);
  }

  async function handleSessionReady(session) {
    if (!session || !session.user || mirrorStarted || mirrorProfileShown) return;
    mirrorSession = session;
    mirrorProfileShown = true;
    renderMirrorHeader(true);
    cleanMirrorUrl();
    await ensurePublicUser(session);
    renderProfileForm(profileFromUser(session.user));
  }

  async function initMirror() {
    mirrorLog("init", { url: window.location.href });
    renderLogin(false);

    var sb = getSupabaseClient();
    if (!sb) {
      renderLogin(true);
      return;
    }

    sb.auth.onAuthStateChange(function (event, session) {
      mirrorLog("auth event", {
        event: event,
        hasSession: !!session,
        authUserId: session && session.user && session.user.id
      });
      if (session) handleSessionReady(session);
    });

    var session = await waitForMirrorSession(sb);
    if (session) {
      mirrorLog("session ready", { authUserId: session.user && session.user.id });
      handleSessionReady(session);
    } else {
      renderLogin(true);
    }
  }

  document.getElementById("goBtn").addEventListener("click", startLogin);
  document.getElementById("saveProfileBtn").addEventListener("click", saveProfileCompletion);
  document.getElementById("skipProfileBtn").addEventListener("click", skipProfileCompletion);

  document.getElementById("dlBtn").addEventListener("click", function () {
    if (lastResult) downloadCanvas(renderIdentityPNG(lastResult), "xora-mirror-" + lastResult.handle + ".png");
  });
  document.getElementById("shareBtn").addEventListener("click", function () {
    if (lastResult) shareOnX(shareIdentityText(lastResult));
  });

  // dil değişince kartı yeniden çiz
  document.addEventListener("xora:lang", function () {
    renderMirrorHeader(!!mirrorSession);
    if (!mirrorSession) renderLogin(!note.hidden);
    if (mirrorSession && mirrorProfileShown && !mirrorStarted) renderProfileForm(profileFromUser(mirrorSession.user));
    if (lastResult && !stepResult.hidden) showResult();
  });

  initMirror();
})();
</script>

</body>
</html>
