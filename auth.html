<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giriş — XORA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <a href="index.html" class="logo">XO<span>RA</span></a>
  <nav class="topnav">
    <a href="credits.html" class="pill credits-pill">⚡ <b id="creditVal">10</b></a>
    <a href="profile.html" class="pill" data-i18n="nav_profile">Profil</a>
    <button type="button" class="pill lang-btn" id="langBtn">EN</button>
  </nav>
</header>

<main class="page">
  <h1 data-i18n="auth_title">XORA’ya Giriş Yap</h1>
  <p class="sub" data-i18n="auth_sub">Analizlerini kaydetmek için XORA hesabına giriş yap.</p>

  <section class="panel">
    <div class="result-actions">
      <button type="button" class="btn btn-sm" id="loginModeBtn" data-i18n="auth_login_tab">Giriş Yap</button>
      <button type="button" class="btn btn-sm btn-ghost" id="signupModeBtn" data-i18n="auth_signup_tab">Üye Ol</button>
    </div>

    <form class="handle-form" id="authForm" autocomplete="off">
      <input type="text" id="xora_auth_username" name="xora_auth_username" class="handle-input" data-i18n-ph="auth_username" placeholder="Kullanıcı adı" autocomplete="new-password" hidden>
      <input type="email" id="xora_auth_email" name="xora_auth_email" class="handle-input" data-i18n-ph="auth_email" placeholder="E-posta" autocomplete="new-password" required>
      <input type="password" id="xora_auth_password" name="xora_auth_password" class="handle-input" data-i18n-ph="auth_password" placeholder="Şifre" autocomplete="new-password" required>
      <input type="password" id="xora_auth_password_confirm" name="xora_auth_password_confirm" class="handle-input" data-i18n-ph="auth_password_confirm" placeholder="Şifre tekrar" autocomplete="new-password" hidden>
      <button type="submit" class="btn" id="submitBtn" data-i18n="auth_login_btn">Giriş Yap</button>
      <p class="cost-note" id="modeHint" data-i18n="auth_need_account">Hesabın yoksa üye ol.</p>
    </form>
  </section>
</main>

<footer class="foot">XORA V1</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>
<script>
(function () {
  var authMode = "login";
  var loginModeBtn = document.getElementById("loginModeBtn");
  var signupModeBtn = document.getElementById("signupModeBtn");
  var form = document.getElementById("authForm");
  var emailInput = document.getElementById("xora_auth_email");
  var usernameInput = document.getElementById("xora_auth_username");
  var passwordInput = document.getElementById("xora_auth_password");
  var passwordConfirmInput = document.getElementById("xora_auth_password_confirm");
  var submitBtn = document.getElementById("submitBtn");
  var modeHint = document.getElementById("modeHint");

  function clearAuthInputs() {
    form.reset();
    usernameInput.value = "";
    emailInput.value = "";
    passwordInput.value = "";
    passwordConfirmInput.value = "";
  }

  function setAuthMode(nextMode) {
    authMode = nextMode;
    clearAuthInputs();
    usernameInput.hidden = authMode !== "signup";
    usernameInput.required = authMode === "signup";
    passwordConfirmInput.hidden = authMode !== "signup";
    passwordConfirmInput.required = authMode === "signup";
    usernameInput.autocomplete = "new-password";
    emailInput.autocomplete = "new-password";
    passwordInput.autocomplete = "new-password";
    passwordConfirmInput.autocomplete = "new-password";
    submitBtn.setAttribute("data-i18n", authMode === "signup" ? "auth_signup_btn" : "auth_login_btn");
    modeHint.setAttribute("data-i18n", authMode === "signup" ? "auth_have_account" : "auth_need_account");
    loginModeBtn.classList.toggle("btn-ghost", authMode !== "login");
    signupModeBtn.classList.toggle("btn-ghost", authMode !== "signup");
    applyI18n();
  }

  loginModeBtn.addEventListener("click", function () { setAuthMode("login"); });
  signupModeBtn.addEventListener("click", function () { setAuthMode("signup"); });
  modeHint.addEventListener("click", function () {
    setAuthMode(authMode === "signup" ? "login" : "signup");
  });

  form.addEventListener("submit", async function (e) {
    e.preventDefault();
    submitBtn.disabled = true;
    console.log("[XORA auth] submit mode:", authMode);

    var email = emailInput.value.trim();
    var username = usernameInput.value.trim().replace(/^@+/, "");
    var password = passwordInput.value;
    var passwordConfirm = passwordConfirmInput.value;

    try {
      if (authMode === "signup") {
        if (!username) throw new Error(t("auth_username_required"));
        if (!email) throw new Error(t("auth_email_required"));
        if (password.length < 6) throw new Error(t("auth_password_min"));
        if (password !== passwordConfirm) throw new Error(t("auth_password_mismatch"));

        var signupResult = await createLocalUser(username, email, password);
        if (!signupResult.success) throw new Error(signupResult.error);
        console.log("[XORA auth] signup result", signupResult.user);
        window.location.href = "profile.html";
        return;
      }

      if (authMode === "login") {
        if (!email) throw new Error(t("auth_email_required"));
        if (!password) throw new Error(t("auth_password_required"));

        var signinResult = await loginLocalUser(email, password);
        if (!signinResult.success) throw new Error(signinResult.error);
        console.log("[XORA auth] signin result", signinResult.user);
        toast(t("auth_success"));
        window.location.href = "profile.html";
        return;
      }
    } catch (err) {
      console.error("[XORA auth] error", err);
      toast(err.message || String(err));
    } finally {
      submitBtn.disabled = false;
    }
  });

  clearAuthInputs();
  setTimeout(clearAuthInputs, 50);
  setTimeout(clearAuthInputs, 250);
  setAuthMode("login");
})();
</script>

</body>
</html>
